<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eLGU Command Center - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: #1e293b; padding: 40px; border-radius: 12px; border: 1px solid #334155; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .auth-card h2 { margin-bottom: 20px; text-align: center; color: white; }
        .modern-input { width: 100%; background: #0f172a; color: white; border: 1px solid #475569; padding: 12px; border-radius: 6px; margin-bottom: 15px; }
        .btn-primary { width: 100%; padding: 12px; font-size: 1rem; cursor: pointer; background-color: #3b82f6; color: white; border: none; border-radius: 6px; font-weight: bold; }
        .btn-primary:hover { background-color: #2563eb; }
        .toggle-link { display: block; text-align: center; margin-top: 15px; color: #3b82f6; cursor: pointer; font-size: 0.9rem; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="auth-card" id="loginBox">
        <div style="text-align: center; margin-bottom: 20px;"><img src="logo_dark.png" style="max-height: 50px;" onerror="this.style.display='none'"></div>
        <h2>Command Center Login</h2>
        <input type="text" id="logUser" class="modern-input" placeholder="Username">
        <input type="password" id="logPass" class="modern-input" placeholder="Password">
        <button class="btn-primary" onclick="processAuth('login')">Access System</button>
        <span class="toggle-link" onclick="toggleAuth()">Create an account instead</span>
    </div>

    <div class="auth-card" id="regBox" style="display: none;">
        <div style="text-align: center; margin-bottom: 20px;"><img src="logo_dark.png" style="max-height: 50px;" onerror="this.style.display='none'"></div>
        <h2>Register New Account</h2>
        <input type="text" id="regUser" class="modern-input" placeholder="Choose Username">
        <input type="password" id="regPass" class="modern-input" placeholder="Choose Password">
        <button class="btn-primary" onclick="processAuth('register')">Create Account & Login</button>
        <span class="toggle-link" onclick="toggleAuth()">Back to Login</span>
    </div>

    <script>
        function toggleAuth() {
            const lb = document.getElementById('loginBox'); const rb = document.getElementById('regBox');
            if(lb.style.display === 'none') { lb.style.display = 'block'; rb.style.display = 'none'; } 
            else { lb.style.display = 'none'; rb.style.display = 'block'; }
        }

        async function processAuth(action) {
            const u = action === 'login' ? document.getElementById('logUser').value : document.getElementById('regUser').value;
            const p = action === 'login' ? document.getElementById('logPass').value : document.getElementById('regPass').value;
            
            if(!u || !p) return alert("Please fill all fields.");

            try {
                const res = await fetch(`api/auth.php?action=${action}`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({username: u, password: p}) 
                });
                
                // Catch raw text first so we don't fail silently if PHP throws a warning
                const text = await res.text(); 
                
                try {
                    const data = JSON.parse(text);
                    if(data.success) { 
                        window.location.href = 'index.html'; 
                    } else { 
                        alert("Login Failed: " + data.message); 
                    }
                } catch(err) {
                    console.error("Backend Error Response:", text);
                    alert("System configuration error. Press F12 and check the Console.");
                }
            } catch(e) {
                console.error("Network Error:", e);
                alert("Network error. Cannot reach the server.");
            }
        }
    </script>
</body>
</html>
